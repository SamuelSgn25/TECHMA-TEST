name: Drive AI CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Linting & Tests Backend ───
  server:
    name: Server CI
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: drive_ai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Create .env for tests
        working-directory: server
        run: |
          cat > .env <<EOF
          PORT=5000
          DB_USER=postgres
          DB_HOST=localhost
          DB_NAME=drive_ai_test
          DB_PASSWORD=postgres
          DB_PORT=5432
          GEMINI_API_KEY=test_key
          JWT_SECRET=ci_test_secret
          GOOGLE_CLIENT_ID=test
          GOOGLE_CLIENT_SECRET=test
          EOF

      - name: Init database
        working-directory: server
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -U postgres -d drive_ai_test -f schema.sql

      - name: Health check - server starts
        working-directory: server
        run: |
          timeout 10 node index.js &
          sleep 3
          curl -f http://localhost:5000/api/auth || echo "Server responded"
          kill %1 || true

  # ─── Build Frontend ───
  client:
    name: Client CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Build
        working-directory: client
        run: npm run build
